<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bhuna Challenge – GCSE English</title>

<style>
body{margin:0;background:#0f172a;color:#e5e7eb;font-family:-apple-system;text-align:center;padding:20px;}
.card{background:#1e293b;padding:18px;border-radius:14px;margin-top:15px;}
button{background:#334155;color:white;border:none;padding:14px;border-radius:10px;margin:6px;width:90%;}
textarea{width:92%;height:110px;border-radius:10px;padding:12px;}
.progress{background:#334155;height:12px;border-radius:8px;}
.bar{background:#60a5fa;height:12px;width:0%;}
.small{font-size:13px;color:#94a3b8;}
</style>
</head>

<body>

<h2>Bhuna Challenge – GCSE English</h2>

<div class="card">
<p>Points: <span id="points"></span></p>
<p>Streak: <span id="streak"></span></p>
<p id="summary" class="small"></p>

<h3>Rewards</h3>
<div id="rewardList"></div>
<p id="nextReward"></p>

<div class="progress"><div id="bar" class="bar"></div></div>
</div>

<div class="card" id="mcSection">
<p id="mcQ"></p>
<div id="mcAnswers"></div>
</div>

<div class="card" id="examSection" style="display:none">
<p id="timer" style="font-weight:bold;"></p>
<p id="extract"></p>
<p><b>Question</b></p>
<p id="questionText"></p>
<p class="small">Write about language and its effect.</p>
<textarea id="answer"></textarea>
<button onclick="submitExam()">Submit</button>
<p id="modelAnswer"></p>
</div>

<script>

let points=+localStorage.getItem("points")||0
let step=+localStorage.getItem("step")||0
let streak=+localStorage.getItem("streak")||0
let sessions=+localStorage.getItem("sessions")||0
let correct=+localStorage.getItem("correct")||0
let total=+localStorage.getItem("total")||0
let difficulty=+localStorage.getItem("difficulty")||1

// streak
let today=new Date().toDateString()
let lastDate=localStorage.getItem("lastDate")
if(lastDate){
let diff=(new Date(today)-new Date(lastDate))/(1000*60*60*24)
if(diff===1)streak++
else if(diff>1)streak=1
}else streak=1
localStorage.setItem("lastDate",today)

// extracts
const extracts=[
{
text:`Lines 1–4

The crowd roared as Frimpong charged forward. The stadium trembled with noise.`,
focus:"How does the writer use language to describe the atmosphere?"
},
{
text:`Lines 2–5

Wirtz glided past defenders like a shadow. The crowd held its breath.`,
focus:"How does the writer describe Wirtz’s movement?"
}
]

// load
function load(){
document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak
if(step<3)loadMC()
else showExam()
}

// MC
function loadMC(){
let q=["The crowd roared","Technique?",["Metaphor","Personification","Simile"],1]
document.getElementById("mcQ").innerText=q[0]+" — "+q[1]

let html=""
q[2].forEach((a,i)=>{
html+=`<button onclick="answer(${i},${q[3]})">${a}</button>`
})
document.getElementById("mcAnswers").innerHTML=html
}

function answer(i,c){
if(i===c){points+=10;step++}
save()
location.reload()
}

// exam
let timeLeft=300
let timer

function startTimer(){
timer=setInterval(()=>{
timeLeft--
document.getElementById("timer").innerText="⏱ "+timeLeft+"s"
if(timeLeft<=0){
clearInterval(timer)
submitExam()
}
},1000)
}

function showExam(){
document.getElementById("mcSection").style.display="none"
document.getElementById("examSection").style.display="block"

let ex=extracts[Math.floor(Math.random()*extracts.length)]
document.getElementById("extract").innerText=ex.text
document.getElementById("questionText").innerText=ex.focus+" (8 marks)"

startTimer()
}

// LEVEL MARKING
function submitExam(){

clearInterval(timer)

let txt=document.getElementById("answer").value.toLowerCase()

let hasQuote = txt.includes("'")
let hasTechnique = txt.includes("metaphor")||txt.includes("verb")
let hasEffect = txt.includes("suggest")||txt.includes("shows")

let level=1

if(hasQuote && hasTechnique) level=2
if(hasQuote && hasTechnique && hasEffect) level=3

let feedback=""

if(level===1){
feedback="Level 1 (1–2 marks)\n\nTo improve: add a quote and technique."
}
if(level===2){
points+=25
feedback="Level 2 (3–5 marks)\n\nTo reach Level 3: explain the effect (this suggests…)."
}
if(level===3){
points+=40
feedback="Level 3 (6–8 marks)\n\nStrong Grade 4 answer."
}

document.getElementById("modelAnswer").innerText=feedback

step=0
sessions++
save()
}

// rewards
function updateRewards(){
let rewards=[150,300,450,600]
let html=""
rewards.forEach(r=>{
html+=`<p>${points>=r?"✓":"○"} ${r}</p>`
})
document.getElementById("rewardList").innerHTML=html
}

function save(){
localStorage.setItem("points",points)
localStorage.setItem("step",step)
localStorage.setItem("streak",streak)
localStorage.setItem("sessions",sessions)
}

load()

</script>

</body>
</html>
