<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GCSE English – Bhuna Challenge</title>

<style>
body{
margin:0;
background:#eef2f7;
font-family:-apple-system;
text-align:center;
padding:20px;
color:#1f2937;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-top:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
background:#1d4ed8;
color:white;
border:none;
padding:14px;
border-radius:10px;
margin:6px;
width:90%;
}

textarea{
width:92%;
height:110px;
border-radius:10px;
padding:10px;
border:1px solid #ccc;
}

.reward{display:flex;justify-content:space-between}
.locked{opacity:0.4}
.unlocked{color:#059669;font-weight:bold}

.progress{height:10px;background:#e5e7eb;border-radius:8px}
.bar{height:10px;background:#2563eb;width:0%}

#popup{
position:fixed;
top:30%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
display:none;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h2>GCSE English – Bhuna Challenge</h2>

<div id="popup"></div>

<div class="card">
<p>Points: <b id="points"></b></p>
<p>Streak: <b id="streak"></b></p>

<h3>Rewards</h3>
<div id="rewards"></div>
<p id="next"></p>

<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="card" id="mc"></div>
<div class="card" id="exam" style="display:none"></div>
<div class="card" id="improve" style="display:none"></div>

<script>

let points=+localStorage.getItem("points")||0
let step=+localStorage.getItem("step")||0
let unlocked=JSON.parse(localStorage.getItem("unlocked"))||[]

document.getElementById("points").innerText=points
document.getElementById("streak").innerText=1

const rewards=[
{name:"Onion Bhaji",pts:120},
{name:"Sag Aloo",pts:240},
{name:"Rice",pts:360},
{name:"Chicken Bhuna",pts:480}
]

function popup(text){
let p=document.getElementById("popup")
p.innerText=text
p.style.display="block"
setTimeout(()=>p.style.display="none",2000)
}

function loadRewards(){

let html=""
let newItem=null

rewards.forEach(r=>{
let u=points>=r.pts

if(u && !unlocked.includes(r.name)){
unlocked.push(r.name)
newItem=r.name
}

html+=`<div class="${u?'unlocked':'locked'}">${r.name} – ${r.pts}</div>`
})

localStorage.setItem("unlocked",JSON.stringify(unlocked))

document.getElementById("rewards").innerHTML=html

let next=rewards.find(r=>points<r.pts)

if(next){
document.getElementById("next").innerText=
"Next: "+next.name+" ("+(next.pts-points)+" pts)"
}

document.getElementById("bar").style.width=(points/480*100)+"%"

if(newItem) popup("🎉 "+newItem+" unlocked!")
}

// QUESTIONS (expanded)
const questions=[
["The crowd roared","Technique?",["Verb","Metaphor","Fact"],0],
["The stadium exploded","Technique?",["Metaphor","Simile","Verb"],0],
["He crept silently","Suggests?",["Stealth","Joy","Fear"],0],
["The silence pressed down","Effect?",["Tension","Fun","Calm"],0],
["The wind screamed","Technique?",["Personification","Fact","Opinion"],0],
["The lights flickered","Creates?",["Tension","Calm","Happiness"],0],
["He sprinted forward","Suggests?",["Speed","Fear","Sadness"],0],
["The room was boiling","Technique?",["Metaphor","Fact","Verb"],0],
["The crowd held its breath","Effect?",["Suspense","Calm","Joy"],0],
["She glared coldly","Effect?",["Anger","Happiness","Confusion"],0]
]

const extracts=[
{
text:"The crowd roared as Frimpong charged forward.",
q:"How does the writer describe the atmosphere? (8 marks)"
},
{
text:"Wirtz moved like a shadow, silent and quick.",
q:"How is movement presented? (8 marks)"
}
]

const weak="The writer uses words to show excitement."

function load(){

loadRewards()

if(step<3){
loadMC()
}else if(step==3){
loadExam()
}else{
loadImprove()
}
}

// MC
function loadMC(){

let q=questions[Math.floor(Math.random()*questions.length)]

let html="<p>"+q[0]+" — "+q[1]+"</p>"

q[2].forEach((a,i)=>{
html+=`<button onclick="ans(${i},${q[3]})">${a}</button>`
})

document.getElementById("mc").innerHTML=html
}

function ans(i,c){

if(i==c){
points+=10
step++
save()
location.reload()
}
}

// EXAM
function loadExam(){

let e=extracts[Math.floor(Math.random()*extracts.length)]

document.getElementById("mc").style.display="none"

document.getElementById("exam").style.display="block"
document.getElementById("exam").innerHTML=`
<p>${e.text}</p>
<p><b>${e.q}</b></p>
<textarea id="ansBox"></textarea>
<button onclick="mark()">Submit</button>
<p id="fb"></p>
`
}

function mark(){

let t=document.getElementById("ansBox").value.toLowerCase()

let score=0
if(t.includes("'"))score++
if(t.includes("metaphor")||t.includes("simile"))score++
if(t.includes("suggest")||t.includes("shows"))score++

let msg="Level 1"
if(score==2){msg="Level 2";points+=20}
if(score==3){msg="Level 3";points+=35}

document.getElementById("fb").innerText=msg+" — add quote + technique + effect"

step++
save()
}

// IMPROVE
function loadImprove(){

document.getElementById("exam").style.display="none"
document.getElementById("improve").style.display="block"

document.getElementById("improve").innerHTML=`
<p>Improve this:</p>
<p>${weak}</p>
<textarea id="imp"></textarea>
<button onclick="done()">Submit</button>
`
}

function done(){
points+=15
step=0
save()
location.reload()
}

function save(){
localStorage.setItem("points",points)
localStorage.setItem("step",step)
}

load()

</script>

</body>
</html>
