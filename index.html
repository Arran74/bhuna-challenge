<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AQA GCSE English – Bhuna Challenge FINAL</title>

<style>
body{margin:0;background:#eef2f7;font-family:-apple-system;text-align:center;padding:20px;color:#1f2937;}
.card{background:white;padding:18px;border-radius:14px;margin-top:15px;box-shadow:0 6px 18px rgba(0,0,0,0.08);}
button{background:#1d4ed8;color:white;border:none;padding:14px;border-radius:10px;margin:6px;width:90%;}
input{width:90%;padding:10px;border-radius:8px;border:1px solid #ccc;margin:5px;}
textarea{width:92%;height:110px;border-radius:10px;padding:10px;border:1px solid #ccc;}
.good{background:#ecfdf5;padding:10px;border-radius:10px;margin-top:10px}
.model{background:#eff6ff;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>AQA GCSE English – Bhuna Challenge 🔥</h2>
<button onclick="startExam()">📝 Start Exam Mode</button>

<div class="card">
<input id="userName" placeholder="Enter name">
<button onclick="setUser()">Switch User</button>
<button onclick="resetAll()">Reset Progress</button>
<p>Current User: <b id="currentUser"></b></p>
</div>

<div class="card">
<p>🔥 Streak: <b id="streak"></b></p>
<p>🎯 Focus: <b id="focus"></b></p>
</div>

<div class="card">
<p>Points: <b id="points"></b></p>
</div>

<div class="card">
<h3>📊 Dashboard</h3>
<p>Total Answers: <b id="totalAns"></b></p>
<p>Average Score: <b id="avgScore"></b></p>
<p>Weakest Skill: <b id="weakestSkill"></b></p>
</div>

<div class="card">
<h3>🏁 Exam Readiness</h3>
<p>Score: <b id="examScore"></b></p>
<p>Status: <b id="examStatus"></b></p>
<p>Confidence: <b id="confidence"></b></p>
<p>Daily Streak: <b id="dailyStreak"></b></p>
</div>

<div class="card" id="mc"></div>
<div class="card" id="exam" style="display:none"></div>

<script>

// USER SYSTEM
let user = localStorage.getItem("currentUser") || "default"
document.getElementById("currentUser").innerText = user

function setUser(){
let name=document.getElementById("userName").value.trim()
if(!name) return
localStorage.setItem("currentUser",name)
location.reload()
}

function resetAll(){
if(confirm("Reset all progress?")){
localStorage.clear()
location.reload()
}
}

function get(key, def){return JSON.parse(localStorage.getItem(user+"_"+key)) ?? def}
function set(key,val){localStorage.setItem(user+"_"+key,JSON.stringify(val))}

// STATE
let points=get("points",0)
let step=get("step",0)
let streak=get("streak",0)
let skills=get("skills",{quote:0,technique:0,effect:0,zoom:0})
let stats=get("stats",{total:0,totalScore:0})
let usage=get("usage",{lastDate:null,streak:0})

// EXAM STATE
let examMode=false,examIndex=0,examAnswers=[],examTime=600,timerInterval=null

// 🔥 50 MC QUESTIONS
const questions = Array.from({length:50},(_,i)=>[
`Q${i+1}: The word 'intense' suggests...`,
"Best answer?",
["Strong emotion","Calm","Confusion"],0
])

// 🔥 15 AQA EXTRACTS
const extracts = [

{type:"P1Q2",text:"The wind howled through the empty streets.",q:"Q2: How does the writer use language?",model:"The verb 'howled' suggests power."},
{type:"P1Q3",text:"It was silent. Then a noise. Then chaos.",q:"Q3: How is structure used?",model:"Short sentences build tension."},
{type:"P1Q4",text:"The fire spread rapidly, destroying everything.",q:"Q4: To what extent do you agree it is dangerous?",model:"I agree because 'destroying' suggests damage."},

{type:"P1Q2",text:"The forest loomed, dark and endless.",q:"Q2: Language?",model:"'Loomed' suggests fear."},
{type:"P1Q3",text:"First calm, then panic.",q:"Q3: Structure?",model:"Contrast builds tension."},
{type:"P1Q4",text:"The storm was unstoppable.",q:"Q4: Do you agree?",model:"I agree due to 'unstoppable'."},

{type:"P2Q2",text:"Source A is positive. Source B is negative.",q:"Q2: Summary?",model:"Different viewpoints."},
{type:"P2Q3",text:"The article says life is fast but tiring.",q:"Q3: Language?",model:"Contrast shows mixed view."},
{type:"P2Q4",text:"Source A celebrates, B criticises.",q:"Q4: Compare?",model:"Different tones."},

{type:"P2Q2",text:"A is exciting, B is stressful.",q:"Q2: Summary?",model:"Opposing views."},
{type:"P2Q3",text:"The writer uses emotional words.",q:"Q3: Language?",model:"Creates impact."},
{type:"P2Q4",text:"One praises, one criticises.",q:"Q4: Compare?",model:"Clear contrast."},

{type:"P1Q2",text:"The sun blazed overhead.",q:"Q2: Language?",model:"'Blazed' suggests intensity."},
{type:"P1Q3",text:"Slow… then sudden movement.",q:"Q3: Structure?",model:"Builds suspense."},
{type:"P1Q4",text:"The situation was terrifying.",q:"Q4: Agree?",model:"Agree due to tone."}
]

// INIT
function load(){
document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak
updateFocus()
updateDashboard()
updateDailyStreak()
updateExamReadiness()

if(!examMode){
if(step<3) loadMC()
else loadExamPractice()
}
}

// FOCUS
function updateFocus(){
let weakest=Object.entries(skills).sort((a,b)=>a[1]-b[1])[0][0]
let map={quote:"Quotes",technique:"Techniques",effect:"Explanation",zoom:"Zoom"}
document.getElementById("focus").innerText=map[weakest]
document.getElementById("weakestSkill").innerText=map[weakest]
}

// MC
function loadMC(){
let q=questions[Math.floor(Math.random()*questions.length)]
let html="<p>"+q[0]+"</p>"
q[2].forEach((a,i)=>html+=`<button onclick="ans(${i},${q[3]})">${a}</button>`)
document.getElementById("mc").innerHTML=html
}

function ans(i,c){
if(i==c){points+=10;step++;streak++}else{streak=0}
save();location.reload()
}

// PRACTICE
function loadExamPractice(){
let e=extracts[Math.floor(Math.random()*extracts.length)]
document.getElementById("mc").style.display="none"
document.getElementById("exam").style.display="block"
document.getElementById("exam").innerHTML=`
<p>${e.text}</p>
<p>${e.q}</p>
<textarea id="ansBox"></textarea>
<button onclick="mark()">Submit</button>
<div id="fb"></div>`
}

// REWRITE
function rewriteAnswer(raw){
let improved=raw
if(!raw.includes("'")) improved="The word '___' "+improved
if(!/verb|metaphor|simile/.test(improved)) improved+=" using language"
if(!/suggests|implies|shows/.test(improved)) improved+=" This suggests that..."
return improved
}

// MARK
function mark(){
let raw=document.getElementById("ansBox").value
let t=raw.toLowerCase()

let hasQuote=t.includes("'")
let hasTechnique=/verb|metaphor|simile|structure|language/.test(t)
let hasEffect=/suggests|implies|shows/.test(t)

let score=[hasQuote,hasTechnique,hasEffect].filter(Boolean).length

if(score<2){
let improved=rewriteAnswer(raw)
document.getElementById("fb").innerHTML=`
<div class="good">${raw}</div>
<div class="model">${improved}</div>
<button onclick="retry()">Improve</button>`
return
}

points+=score*10
stats.total++
stats.totalScore+=score
set("stats",stats)

document.getElementById("fb").innerHTML=`
<p>+${score*10} points</p>
<button onclick="nextQuestion()">Continue</button>`
}

function retry(){
let raw=document.getElementById("ansBox").value
document.getElementById("ansBox").value=rewriteAnswer(raw)
}

function nextQuestion(){
step=0
save()
location.reload()
}

// DASHBOARD
function updateDashboard(){
document.getElementById("totalAns").innerText=stats.total
document.getElementById("avgScore").innerText=(stats.total? (stats.totalScore/stats.total).toFixed(1):0)
}

// STREAK
function updateDailyStreak(){
let today=new Date().toDateString()
if(usage.lastDate!==today){
usage.streak++
usage.lastDate=today
set("usage",usage)
}
document.getElementById("dailyStreak").innerText=usage.streak
}

// READINESS
function updateExamReadiness(){
let avg=stats.total?(stats.totalScore/stats.total):0
let score=Math.round(avg*25)
document.getElementById("examScore").innerText=score+"%"
document.getElementById("examStatus").innerText=score>70?"Ready":"Not Ready"
document.getElementById("confidence").innerText=avg>3?"High":"Growing"
}

// EXAM MODE
function startExam(){
examMode=true
examIndex=0
examAnswers=[]
startTimer()
loadExamQ()
}

function startTimer(){
timerInterval=setInterval(()=>{
examTime--
if(examTime<=0){clearInterval(timerInterval);endExam()}
},1000)
}

function loadExamQ(){
let e=extracts[examIndex]
document.getElementById("exam").innerHTML=`
<p>${e.text}</p>
<p>${e.q}</p>
<textarea id="ansBox"></textarea>
<button onclick="submitExam()">Submit</button>`
}

function submitExam(){
examAnswers.push(document.getElementById("ansBox").value)
examIndex++
if(examIndex>=3) endExam()
else loadExamQ()
}

function endExam(){
clearInterval(timerInterval)
let total=0
examAnswers.forEach(a=>{
let t=a.toLowerCase()
let s=0
if(t.includes("'")) s++
if(/verb|metaphor|simile/.test(t)) s++
if(/suggests|implies/.test(t)) s++
total+=s
})
let percent=Math.round((total/(examAnswers.length*3))*100)
document.getElementById("exam").innerHTML=`
<h3>Exam Result</h3>
<p>${percent}%</p>
<button onclick="location.reload()">Back</button>`
}

// SAVE
function save(){
set("points",points)
set("step",step)
set("streak",streak)
set("skills",skills)
set("stats",stats)
set("usage",usage)
}

load()

</script>

</body>
</html>
