<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GCSE English – Bhuna Challenge</title>

<style>
body{
margin:0;
background:#eef2f7;
font-family:-apple-system;
text-align:center;
padding:20px;
color:#1f2937;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-top:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
background:#1d4ed8;
color:white;
border:none;
padding:14px;
border-radius:10px;
margin:6px;
width:90%;
}

textarea{
width:92%;
height:110px;
border-radius:10px;
padding:10px;
border:1px solid #ccc;
}

.locked{opacity:0.4}
.unlocked{color:#059669;font-weight:bold}

.good{background:#ecfdf5;padding:10px;border-radius:10px;margin-top:10px}
.model{background:#eff6ff;padding:10px;border-radius:10px;margin-top:10px}
.improve{background:#fff7ed;padding:10px;border-radius:10px;margin-top:10px}
.coach{background:#f0f9ff;padding:10px;border-radius:10px;margin-top:10px}

.progress{height:10px;background:#e5e7eb;border-radius:8px}
.bar{height:10px;background:#2563eb;width:0%}
</style>
</head>

<body>

<h2>GCSE English – Bhuna Challenge</h2>

<div class="card">
<b>Mode:</b><br>
<button onclick="setMode('4')">Grade 4</button>
<button onclick="setMode('6')">Grade 6</button>
<p id="modeDisplay"></p>
</div>

<div class="card">
<p>Points: <b id="points"></b></p>
<h3>Rewards</h3>
<div id="rewards"></div>
<p id="next"></p>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="card" id="mc"></div>
<div class="card" id="exam" style="display:none"></div>

<script>

// MODE
let mode=localStorage.getItem("mode")||"4"
function setMode(m){mode=m;localStorage.setItem("mode",m);location.reload()}
document.getElementById("modeDisplay").innerText=
mode==="6"?"Grade 6 Mode 🔥":"Grade 4 Mode"

// STATE
let points=+localStorage.getItem("points")||0
let step=+localStorage.getItem("step")||0
let unlocked=JSON.parse(localStorage.getItem("unlocked"))||[]
document.getElementById("points").innerText=points

// REWARDS
const rewards=[
{name:"Onion Bhaji",pts:120},
{name:"Sag Aloo",pts:240},
{name:"Rice",pts:360},
{name:"Chicken Bhuna",pts:480}
]

function loadRewards(){
let html=""
rewards.forEach(r=>{
let u=points>=r.pts
if(u && !unlocked.includes(r.name)) unlocked.push(r.name)
html+=`<div class="${u?'unlocked':'locked'}">${r.name} – ${r.pts}</div>`
})
localStorage.setItem("unlocked",JSON.stringify(unlocked))
document.getElementById("rewards").innerHTML=html

let next=rewards.find(r=>points<r.pts)
document.getElementById("next").innerText=
next? "Next: "+next.name+" ("+(next.pts-points)+" pts)":"All rewards unlocked"

document.getElementById("bar").style.width=(Math.min(points/480,1)*100)+"%"
}

// QUESTIONS
const questions=[
["The word 'surged' suggests...","Best answer?",["Power and speed","Calm movement","Weakness"],0],
["The phrase 'wave of sound' suggests...","Best answer?",["Overwhelming noise","Quiet","Confusion"],0]
]

// EXTRACT
const extract={
text:`The crowd roared as Frimpong surged forward. The sound crashed across the stadium.`,
q:"How does the writer describe the atmosphere? (8 marks)",
model:`The verb "surged" suggests powerful, unstoppable movement. The metaphor "crashed across the stadium" implies overwhelming noise, creating a dramatic atmosphere.`
}

// FLOW
function load(){
loadRewards()
if(step<2) loadMC()
else loadExam()
}

// MC
function loadMC(){
let q=questions[Math.floor(Math.random()*questions.length)]
let html="<p>"+q[0]+" — "+q[1]+"</p>"
q[2].forEach((a,i)=>{
html+=`<button onclick="ans(${i},${q[3]})">${a}</button>`
})
document.getElementById("mc").innerHTML=html
}

function ans(i,c){
if(i==c){points+=10;step++;save()}
location.reload()
}

// EXAM
function loadExam(){
document.getElementById("mc").style.display="none"
document.getElementById("exam").style.display="block"

document.getElementById("exam").innerHTML=`
<p>${extract.text}</p>
<p><b>${extract.q}</b></p>
<textarea id="ansBox"></textarea>
<button onclick="mark()">Submit</button>
<div id="fb"></div>
`
}

// SMART COACH MARKING
function mark(){

let raw=document.getElementById("ansBox").value
let t=raw.toLowerCase()

let hasQuote = t.includes("'")||t.includes('"')
let hasTechnique = t.includes("metaphor")||t.includes("simile")||t.includes("verb")
let hasEffect = t.includes("suggest")||t.includes("shows")
let hasZoom = t.includes("word")||t.includes("verb")

let feedback=[]
let coach=[]

if(!hasQuote){
feedback.push("Missing quote")
coach.push("👉 Try: The word 'surged' suggests...")
}

if(!hasTechnique){
feedback.push("Missing technique")
coach.push("👉 Name it: metaphor / verb / simile")
}

if(!hasEffect){
feedback.push("Missing explanation")
coach.push("👉 Add: this suggests that...")
}

if(mode==="6" && !hasZoom){
feedback.push("No word-level analysis")
coach.push("👉 Zoom in on one word")
}

let score=[hasQuote,hasTechnique,hasEffect,(mode==="6"?hasZoom:true)].filter(Boolean).length

let level=""
if(score<=1) level="Level 1"
else if(score==2) level="Level 2"
else if(score>=3) level="Level 3 / Grade 6 🔥"

document.getElementById("fb").innerHTML=
`<p><b>${level}</b></p>

<div class="good"><b>Your answer:</b><br>${raw}</div>

<div class="improve"><b>What’s missing:</b><br>${feedback.join("<br>")||"Nothing major"}</div>

<div class="coach"><b>How to fix it:</b><br>${coach.join("<br>")||"Excellent — keep this structure"}</div>

<div class="model"><b>Grade 6 model:</b><br>${extract.model}</div>
`

points+=20
step=0
save()
}

// SAVE
function save(){
localStorage.setItem("points",points)
localStorage.setItem("step",step)
}

load()

</script>

</body>
</html>
