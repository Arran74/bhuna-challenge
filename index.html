<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AQA GCSE English Trainer</title>

<style>
body{margin:0;background:#eef2f7;font-family:-apple-system;text-align:center;padding:20px}
.card{background:white;padding:18px;border-radius:14px;margin-top:15px}
button{background:#1d4ed8;color:white;border:none;padding:14px;border-radius:10px;margin:6px;width:90%}
textarea{width:92%;height:120px}
</style>
</head>

<body>

<h2>AQA GCSE English – Ultimate Trainer 🔥</h2>

<button onclick="setMode('fast')">⚡ Fast</button>
<button onclick="setMode('exam')">📝 Exam</button>
<button onclick="startExam()">📝 Full Exam</button>

<div class="card">
<input id="userName" placeholder="Enter name">
<button onclick="setUser()">Switch User</button>
<p>User: <b id="user"></b></p>
</div>

<div class="card">
<p>Points: <b id="points"></b></p>
<p>Streak: <b id="streak"></b></p>
<p>Daily: <b id="daily"></b></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Total: <b id="total"></b></p>
<p>Average: <b id="avg"></b></p>
<p>Weak Skill: <b id="weak"></b></p>
<p>Readiness: <b id="ready"></b></p>
</div>

<div class="card" id="mc"></div>
<div class="card" id="main"></div>

<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
