<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bhuna Challenge – GCSE English</title>

<style>
body{
margin:0;
background:#0f172a;
color:#e5e7eb;
font-family:-apple-system,system-ui;
text-align:center;
padding:20px;
}

h1{color:#cbd5f5;font-size:22px;}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-top:15px;
}

button{
background:#334155;
color:white;
border:none;
padding:14px;
border-radius:10px;
margin:6px;
width:90%;
}

textarea{
width:92%;
height:110px;
border-radius:10px;
padding:12px;
background:#f1f5f9;
}

.progress{background:#334155;height:12px;border-radius:8px;margin-top:12px;}
.bar{background:#60a5fa;height:12px;width:0%;}

.reward{display:flex;justify-content:space-between;}
.locked{opacity:0.4;}
.unlocked{color:#4ade80;}

.correct{color:#4ade80;}
.wrong{color:#f87171;}
.small{font-size:13px;color:#94a3b8;}
</style>
</head>

<body>

<h1>Bhuna Challenge – GCSE English</h1>

<div class="card">
<p>Points: <span id="points"></span></p>
<p>Streak: <span id="streak"></span></p>

<p id="summary" class="small"></p>

<h3>Rewards</h3>
<div id="rewardList"></div>
<p id="nextReward"></p>

<div class="progress"><div id="bar" class="bar"></div></div>
<p id="celebration"></p>
</div>

<div class="card" id="mcSection">
<p id="mcQ"></p>
<div id="mcAnswers"></div>
<p id="feedback"></p>
</div>

<div class="card" id="examSection" style="display:none">
<p id="extract"></p>
<p><b>Question</b></p>
<p id="questionText"></p>
<p class="small">Write about language and its effect on the reader.</p>
<textarea id="answer"></textarea>
<button onclick="submitExam()">Submit</button>
<p id="modelAnswer"></p>
</div>

<div class="card" id="improveSection" style="display:none">
<p><b>Improve this answer:</b></p>
<p id="weakAnswer"></p>
<textarea id="improve"></textarea>
<button onclick="submitImprove()">Improve</button>
<p id="comparison"></p>
</div>

<div class="card" id="bossSection" style="display:none">
<p><b>Bhuna Boss Challenge</b></p>
<p id="bossExtract"></p>
<textarea id="bossAnswer"></textarea>
<button onclick="submitBoss()">Submit</button>
<p id="bossModel"></p>
</div>

<script>

// DATA
let points=+localStorage.getItem("points")||0
let step=+localStorage.getItem("step")||0
let streak=+localStorage.getItem("streak")||0
let sessions=+localStorage.getItem("sessions")||0
let correct=+localStorage.getItem("correct")||0
let total=+localStorage.getItem("total")||0
let difficulty=+localStorage.getItem("difficulty")||1
let lastReward=+localStorage.getItem("lastReward")||0

// STREAK
let today=new Date().toDateString()
let lastDate=localStorage.getItem("lastDate")
if(lastDate){
let diff=(new Date(today)-new Date(lastDate))/(1000*60*60*24)
if(diff===1)streak++
else if(diff>1)streak=1
}else streak=1
localStorage.setItem("lastDate",today)

// QUESTIONS
const easy=[
["The crowd roared","Technique?",["Metaphor","Personification","Simile"],1],
["He ran quickly","What is this?",["Verb","Noun","Adjective"],0]
]

const medium=[
["The crowd exploded with noise","Technique?",["Metaphor","Personification","Simile"],0],
["He darted forward","Suggests?",["Speed","Fear","Pain"],0]
]

const hard=[
["The stadium became a cauldron of noise","Technique?",["Metaphor","Fact","Command"],0],
["The silence suffocated the room","Effect?",["Tension","Happiness","Calm"],0]
]

// GCSE EXTRACTS
const extracts=[
{
text:`Lines 1–4

The crowd roared as Frimpong charged forward. The stadium trembled with noise, a wave of sound crashing over the pitch.`,
focus:"How does the writer use language to describe the atmosphere?"
},
{
text:`Lines 2–5

Wirtz glided past defenders, moving like a shadow. The crowd held its breath before erupting into noise.`,
focus:"How does the writer use language to describe Wirtz’s movement?"
},
{
text:`Lines 1–4

The silence filled the stadium. It pressed down on the players, heavy and suffocating.`,
focus:"How does the writer use language to describe the mood?"
}
]

const weak="The writer uses words to show excitement."
const model="The writer uses the word 'exploded' which suggests intensity, making the reader feel the excitement."

function getQuestions(){
if(difficulty===1)return easy
if(difficulty===2)return medium
return hard
}

// LOAD
function load(){

document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak

let acc = total ? Math.round((correct/total)*100) : 0

document.getElementById("summary").innerText=
"Accuracy: "+acc+"% | Sessions: "+sessions

updateRewards()

if(sessions>0 && sessions%5===0 && step===0){
showBoss();return
}

if(step<3)loadMC()
else if(step===3)showExam()
else if(step===4)showImprove()
}

// MCQ
function loadMC(){
let qs=getQuestions()
let q=qs[Math.floor(Math.random()*qs.length)]

document.getElementById("mcQ").innerText=q[0]+" — "+q[1]

let html=""
q[2].forEach((a,i)=>{
html+=`<button onclick="answer(${i},${q[3]})">${a}</button>`
})
document.getElementById("mcAnswers").innerHTML=html
}

function answer(i,c){
total++
if(i===c){points+=10;correct++;step++}
save()
setTimeout(()=>location.reload(),300)
}

// EXAM
function showExam(){
document.getElementById("mcSection").style.display="none"
document.getElementById("examSection").style.display="block"

let ex = extracts[Math.floor(Math.random()*extracts.length)]

document.getElementById("extract").innerText = ex.text
document.getElementById("questionText").innerText =
ex.focus + " (8 marks)"
}

// AUTO BUILDER
function buildBetterAnswer(txt){
let word="'language'"
if(txt.includes("roar")) word="'roared'"
if(txt.includes("explod")) word="'exploded'"
if(txt.includes("silent")) word="'silence'"

return "The word "+word+" suggests intensity, making the reader feel the atmosphere."
}

// MARKING
function submitExam(){

let txt = document.getElementById("answer").value.toLowerCase()

let hasQuote = txt.includes("'") || txt.includes('"')
let hasTechnique = txt.includes("metaphor") || txt.includes("simile") || txt.includes("verb")
let hasEffect = txt.includes("suggest") || txt.includes("shows") || txt.includes("makes")

let score=0
let feedback=[]

if(hasQuote)score++; else feedback.push("Add a quote")
if(hasTechnique)score++; else feedback.push("Name technique")
if(hasEffect)score++; else feedback.push("Explain effect")

let improved = buildBetterAnswer(txt)

if(score===3){
points+=40
document.getElementById("modelAnswer").innerText="Strong answer\n\n"+improved
}else if(score===2){
points+=25
document.getElementById("modelAnswer").innerText="Nearly there:\n"+feedback.join("\n")+"\n\nTry:\n"+improved
}else{
document.getElementById("modelAnswer").innerText="Improve:\n"+feedback.join("\n")+"\n\nTry:\n"+improved
}

step=4
save()
setTimeout(()=>location.reload(),2000)
}

// IMPROVE
function showImprove(){
document.getElementById("examSection").style.display="none"
document.getElementById("improveSection").style.display="block"
document.getElementById("weakAnswer").innerText=weak
}

function submitImprove(){
points+=20
sessions++
step=0
save()
}

// BOSS
function showBoss(){
document.getElementById("mcSection").style.display="none"
document.getElementById("bossSection").style.display="block"
document.getElementById("bossExtract").innerText="Describe the atmosphere."
}

function submitBoss(){
points+=60
sessions++
step=0
save()
}

// REWARDS
function updateRewards(){

let rewards=[
{name:"Onion Bhaji",pts:150},
{name:"Sag Aloo",pts:300},
{name:"Rice",pts:450},
{name:"Chicken Bhuna",pts:600}
]

let html=""
rewards.forEach(r=>{
let unlocked = points >= r.pts
html += `<div class="reward ${unlocked?'unlocked':'locked'}">
<span>${r.name}</span><span>${r.pts}</span></div>`
})

document.getElementById("rewardList").innerHTML=html

let next = rewards.find(r=>points < r.pts)

if(next){
document.getElementById("nextReward").innerText=
"Next: "+next.name+" ("+(next.pts-points)+" pts)"
}

document.getElementById("bar").style.width=(points/600*100)+"%"
}

function save(){
localStorage.setItem("points",points)
localStorage.setItem("step",step)
localStorage.setItem("streak",streak)
localStorage.setItem("sessions",sessions)
localStorage.setItem("correct",correct)
localStorage.setItem("total",total)
localStorage.setItem("difficulty",difficulty)
}

load()

</script>

</body>
</html>
