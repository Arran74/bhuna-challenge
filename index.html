<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bhuna Challenge – GCSE English 🍛</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:-apple-system, Arial;
text-align:center;
padding:20px;
}

h1{color:#c8102e;}

.card{
background:#1a1a1a;
padding:16px;
border-radius:12px;
margin-top:15px;
}

button{
background:#c8102e;
color:white;
border:none;
padding:12px;
border-radius:10px;
margin:5px;
width:85%;
max-width:340px;
}

textarea{
width:90%;
height:120px;
border-radius:10px;
padding:10px;
color:black;
}

.progress{
background:#333;
height:16px;
border-radius:10px;
margin-top:10px;
}

.bar{
background:#c8102e;
height:16px;
width:0%;
border-radius:10px;
}

#feedback{
margin-top:10px;
font-weight:bold;
}

#celebration{
display:none;
font-size:22px;
margin-top:15px;
color:#00ffcc;
animation: pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<h1>🔥 Bhuna Challenge – GCSE English</h1>

<div class="card">
<p><b>Points:</b> <span id="points"></span></p>
<p><b>🔥 Streak:</b> <span id="streak"></span></p>
<p id="nextReward"></p>
<p id="unlocked"></p>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="celebration"></div>
</div>

<div class="card" id="mcSection">
<p id="mcQ"></p>
<div id="mcAnswers"></div>
<p id="feedback"></p>
</div>

<div class="card" id="examSection" style="display:none">
<p><b>Extract:</b></p>
<p id="extract"></p>

<p><b>Question:</b></p>
<p>How does the writer use language to create an effect?</p>

<textarea id="answer"></textarea>
<button onclick="submitExam()">Submit Answer</button>

<p id="modelAnswer" style="margin-top:10px;"></p>
</div>

<div class="card" id="complete" style="display:none">
<h2>✅ Session Complete</h2>
<button onclick="restart()">Next Session</button>
</div>

<script>

let points = parseInt(localStorage.getItem("points")) || 0
let step = parseInt(localStorage.getItem("step")) || 0
let streak = parseInt(localStorage.getItem("streak")) || 0
let used = JSON.parse(localStorage.getItem("usedQs")) || []
let lastReward = parseInt(localStorage.getItem("lastReward")) || 0

// streak logic
let today = new Date().toDateString()
let lastDate = localStorage.getItem("lastDate")

if(lastDate){
let diff = (new Date(today) - new Date(lastDate))/(1000*60*60*24)
if(diff===1) streak++
else if(diff>1) streak=1
}else streak=1

localStorage.setItem("lastDate", today)

const mcQuestions = [
["The crowd roared as Frimpong scored","Which technique?",["Metaphor","Personification","Simile"],1],
["Wirtz glided past defenders","What does 'glided' suggest?",["Ease","Fear","Pain"],0],
["The ball flew like a rocket","Technique?",["Simile","Fact","List"],0],
["Rain hammered the pitch","Suggests?",["Violence","Calm","Soft"],0],
["Fans exploded with joy","Strongest word?",["fans","exploded","joy"],1],
["He crept through defenders","Meaning?",["Stealth","Speed","Power"],0]
]

const extracts = [
"The stadium roared as Frimpong fired the ball into the net.",
"The wind howled through empty streets.",
"Fans erupted as Wirtz curled the ball into the top corner."
]

function load(){
document.getElementById("points").innerText = points
document.getElementById("streak").innerText = streak
updateRewards()

if(step<3) loadMC()
else if(step===3) showExam()
else showComplete()
}

function loadMC(){
if(used.length===mcQuestions.length) used=[]
let available = mcQuestions.filter((q,i)=>!used.includes(i))
let i = Math.floor(Math.random()*available.length)
let q = available[i]
let realIndex = mcQuestions.indexOf(q)
used.push(realIndex)
localStorage.setItem("usedQs", JSON.stringify(used))

document.getElementById("mcQ").innerText = q[0]+" — "+q[1]

let html=""
q[2].forEach((a,idx)=>{
html += `<button onclick="answer(${idx},${q[3]})">${a}</button>`
})
document.getElementById("mcAnswers").innerHTML = html
}

function answer(i,c){
let f = document.getElementById("feedback")
if(i===c){
points+=10
step++
f.innerText="✅ Correct"
}else{
f.innerText="❌ Think about the effect"
}
save()
setTimeout(()=>location.reload(),500)
}

function showExam(){
document.getElementById("mcSection").style.display="none"
document.getElementById("examSection").style.display="block"
document.getElementById("extract").innerText =
extracts[Math.floor(Math.random()*extracts.length)]
}

function submitExam(){
let txt=document.getElementById("answer").value.toLowerCase()
let model = "The writer uses powerful language like 'roared' which suggests intensity. This makes the reader feel the excitement."

if(txt.includes("writer") && txt.includes("suggest")){
points+=40
document.getElementById("modelAnswer").innerText="✅ Good answer\n\nExample:\n"+model
}else{
document.getElementById("modelAnswer").innerText="❌ Improve it:\nUse 'The writer uses... This suggests...'\n\nExample:\n"+model
}

step=4
save()
setTimeout(()=>location.reload(),1500)
}

function showComplete(){
document.getElementById("mcSection").style.display="none"
document.getElementById("examSection").style.display="none"
document.getElementById("complete").style.display="block"
}

function restart(){
step=0
save()
location.reload()
}

function updateRewards(){
let rewards=[150,300,450,600]

let next = rewards.find(r=>points<r)

document.getElementById("nextReward").innerText =
next ? "Next reward at "+next+" points" : "All rewards unlocked 🍛"

document.getElementById("unlocked").innerText =
"Unlocked rewards: "+rewards.filter(r=>points>=r).join(", ")

document.getElementById("bar").style.width=(points/600*100)+"%"

// explosion
if(points>=150 && lastReward<150){
celebrate("🍛 Onion Bhaji Unlocked!")
lastReward=150
}
if(points>=300 && lastReward<300){
celebrate("🍛 Sag Aloo Unlocked!")
lastReward=300
}
if(points>=450 && lastReward<450){
celebrate("🍛 Rice Unlocked!")
lastReward=450
}
if(points>=600 && lastReward<600){
celebrate("🍛 Chicken Bhuna Unlocked!")
lastReward=600
}

localStorage.setItem("lastReward", lastReward)
}

function celebrate(msg){
let el=document.getElementById("celebration")
el.innerText=msg+" 💥"
el.style.display="block"
}

function save(){
localStorage.setItem("points",points)
localStorage.setItem("step",step)
localStorage.setItem("streak",streak)
}

load()

</script>

</body>
</html>
