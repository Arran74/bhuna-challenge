<!DOCTYPE html>
<
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Bhuna Challenge – GCSE English 🍛</title>

<style>be
body{
background:#0b0b0b;
color:white;
font-family:-apple-system,BlinkMacSystemFont,Arial;
text-align:center;
padding:20px;
}

h1{color:#c8102e;}

.card{
background:#1a1a1a;
padding:18px;
border-radius:14px;
margin-top:18px;
}

button{
background:#c8102e;
border:none;
padding:12px;
color:white;
font-size:16px;
border-radius:10px;
margin:6px;
width:85%;
max-width:340px;
}

textarea{
width:90%;
height:110px;
border-radius:10px;
padding:10px;
}

.progress{
background:#333;
border-radius:10px;
height:18px;
margin-top:10px;
}

.bar{
background:#c8102e;
height:18px;
width:0%;
border-radius:10px;
}

.small{font-size:13px;opacity:0.7;}
</style>
</head>

<body>

<h1 id="title">The Bhuna Challenge – GCSE English 🍛</h1>

<div class="card">
<p>⭐ Points: <span id="points"></span></p>
<p>🔥 Streak: <span id="streak"></span></p>
<p>📅 Missions: <span id="missions"></span></p>
<p>🏆 Week: <span id="week"></span></p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="reward"></p>
</div>

<div class="card">
<b>Weekly Focus</b>
<p id="focus"></p>
<p class="small">5 minute GCSE English training</p>
</div>

<div class="card" id="questionCard">
<p id="skill"></p>
<p id="question"></p>
<div id="answers"></div>
</div>

<div class="card" id="writingCard" style="display:none">
<p id="writingPrompt"></p>
<textarea id="writing"></textarea>
<br>
<button onclick="submitWriting()">Submit</button>
</div>

<script>

let points=parseInt(localStorage.getItem("points"))||0
let streak=parseInt(localStorage.getItem("streak"))||0
let missions=parseInt(localStorage.getItem("missions"))||0

document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak
document.getElementById("missions").innerText=missions

const weeks=[
"Week 1: Powerful verbs and vocabulary",
"Week 2: Language analysis",
"Week 3: Imagery and description",
"Week 4: Structure",
"Week 5: Persuasion",
"Week 6: Mini exam questions",
"Week 7: Exam rescue practice"
]

let currentWeek=Math.min(Math.floor(missions/7),6)

document.getElementById("week").innerText=currentWeek+1
document.getElementById("focus").innerText=weeks[currentWeek]

const baseQuestions=[
{skill:"Language",text:"Mohamed Salah burst past the defender.",answers:["burst","past","defender"],correct:0},
{skill:"Language",text:"Jeremie Frimpong raced down the wing.",answers:["wing","raced","down"],correct:1},
{skill:"Language",text:"Florian Wirtz curled the ball into the corner.",answers:["curled","ball","corner"],correct:0},
{skill:"Imagery",text:"The stadium roared as the goal went in.",answers:["roared","goal","went"],correct:0},
{skill:"Imagery",text:"The wind howled through the empty street.",answers:["empty","street","howled"],correct:2},
{skill:"Writing",text:"Which sentence sounds strongest?",answers:["The player ran.","The player sprinted toward goal.","The player moved forward."],correct:1}
]

let questions=[]
for(let i=0;i<300;i++){
questions.push(baseQuestions[i%baseQuestions.length])
}

let current

function loadQuestion(){

current=questions[Math.floor(Math.random()*questions.length)]

document.getElementById("skill").innerText="Skill: "+current.skill

document.getElementById("question").innerHTML=current.text+"<br><br>Select the best answer."

let html=""

current.answers.forEach((a,i)=>{
html+=`<button onclick="answer(${i})">${a}</button>`
})

document.getElementById("answers").innerHTML=html
}

function answer(i){

if(i===current.correct){

points+=10
missions+=1

alert("Correct. Strong vocabulary helps GCSE language analysis.")

if(missions%7===0){
showWriting()
}

}else{

alert("Look for the strongest or most vivid word.")

}

save()

}

function showWriting(){

document.getElementById("questionCard").style.display="none"
document.getElementById("writingCard").style.display="block"

document.getElementById("writingPrompt").innerText=
"Weekly challenge: Explain why '"+current.answers[current.correct]+"' is effective. Write 3 sentences."

}

function submitWriting(){

let txt=document.getElementById("writing").value.toLowerCase()

if(txt.includes("speed")||txt.includes("fast")||txt.includes("power")||txt.includes("strong")||txt.includes("dramatic")){

points+=40
streak+=1

alert("Great explanation. Weekly challenge complete.")

}else{

alert("Tip: explain what the word suggests to the reader.")

}

save()

document.getElementById("writingCard").style.display="none"
document.getElementById("questionCard").style.display="block"

loadQuestion()

}

function save(){

localStorage.setItem("points",points)
localStorage.setItem("streak",streak)
localStorage.setItem("missions",missions)

document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak
document.getElementById("missions").innerText=missions

updateBar()

}

function updateBar(){

let percent=(points/600)*100

document.getElementById("bar").style.width=percent+"%"

if(points>=600){
document.getElementById("reward").innerText="🍛 Chicken Bhuna unlocked"
}
else if(points>=450){
document.getElementById("reward").innerText="Next reward: Rice"
}
else if(points>=300){
document.getElementById("reward").innerText="Next reward: Sag Aloo"
}
else if(points>=150){
document.getElementById("reward").innerText="Next reward: Onion Bhaji"
}
else{
document.getElementById("reward").innerText="Start your first mission"
}

}

let taps=0

document.getElementById("title").onclick=function(){

taps++

if(taps===5){

let grade="Grade 3"

if(points>300) grade="Grade 4"
if(points>700) grade="Grade 5"

alert(
"Parent Dashboard\n"+
"Missions: "+missions+"\n"+
"Points: "+points+"\n"+
"Streak: "+streak+"\n"+
"Training Week: "+(currentWeek+1)+"\n"+
"Estimated GCSE Grade: "+grade
)

taps=0

}

}

updateBar()
loadQuestion()

</script>

</body>
</html>
