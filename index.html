<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhuna Challenge – GCSE English</title>

<style>
body {
    background: #0b0b0b;
    color: white;
    font-family: -apple-system, Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 28px;
}

.card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    margin: 20px auto;
    max-width: 500px;
}

button {
    background: #ff6600;
    border: none;
    padding: 12px 20px;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ff8533;
}
</style>
</head>

<body>

<h1>🔥 Bhuna Challenge</h1>

<div class="card">
    <h2 id="question">Loading question...</h2>
    <button onclick="showAnswer()">Show Answer</button>
    <p id="answer" style="display:none;"></p>
</div>

<script>
const questions = [
    {
        q: "What is a metaphor?",
        a: "A comparison saying something IS something else."
    },
    {
        q: "What is a simile?",
        a: "A comparison using 'like' or 'as'."
    },
    {
        q: "What is alliteration?",
        a: "Repeating the same starting sound in words."
    },
    {
        q: "What is personification?",
        a: "Giving human qualities to non-human things."
    },
    {
        q: "What is a noun?",
        a: "A naming word (person, place, thing)."
    },
    {
        q: "What is a verb?",
        a: "A doing or action word."
    },
    {
        q: "What is an adjective?",
        a: "A describing word."
    }
];

function getQuestionOfDay() {
    const today = new Date().getDay(); // 0–6
    return questions[today % questions.length];
}

const todayQ = getQuestionOfDay();

document.getElementById("question").innerText = todayQ.q;

function showAnswer() {
    const answerEl = document.getElementById("answer");
    answerEl.innerText = todayQ.a;
    answerEl.style.display = "block";
}
</script>

</body>
</html>
