<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GCSE English – Bhuna Challenge</title>

<style>
body{
margin:0;
background:#eef2f7;
font-family:-apple-system;
text-align:center;
padding:20px;
color:#1f2937;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-top:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button{
background:#1d4ed8;
color:white;
border:none;
padding:14px;
border-radius:10px;
margin:6px;
width:90%;
}

textarea{
width:92%;
height:110px;
border-radius:10px;
padding:10px;
border:1px solid #ccc;
}

.reward{display:flex;justify-content:space-between}
.locked{opacity:0.4}
.unlocked{color:#059669;font-weight:bold}

.progress{height:10px;background:#e5e7eb;border-radius:8px}
.bar{height:10px;background:#2563eb;width:0%}

#popup{
position:fixed;
top:30%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
display:none;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h2>GCSE English – Bhuna Challenge</h2>

<div id="popup"></div>

<div class="card">
<p>Points: <b id="points"></b></p>
<p>Streak: <b id="streak"></b></p>

<h3>Rewards</h3>
<div id="rewards"></div>
<p id="next"></p>

<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="card" id="mc"></div>
<div class="card" id="exam" style="display:none"></div>
<div class="card" id="improve" style="display:none"></div>

<script>

// DATA
let points=+localStorage.getItem("points")||0
let step=+localStorage.getItem("step")||0
let unlocked=JSON.parse(localStorage.getItem("unlocked"))||[]

document.getElementById("points").innerText=points
document.getElementById("streak").innerText=1

// REWARDS
const rewards=[
{name:"Onion Bhaji",pts:120},
{name:"Sag Aloo",pts:240},
{name:"Rice",pts:360},
{name:"Chicken Bhuna",pts:480}
]

function popup(text){
let p=document.getElementById("popup")
p.innerText=text
p.style.display="block"
setTimeout(()=>p.style.display="none",2000)
}

function loadRewards(){

let html=""
let newItem=null

rewards.forEach(r=>{
let u=points>=r.pts

if(u && !unlocked.includes(r.name)){
unlocked.push(r.name)
newItem=r.name
}

html+=`<div class="${u?'unlocked':'locked'}">${r.name} – ${r.pts}</div>`
})

localStorage.setItem("unlocked",JSON.stringify(unlocked))

document.getElementById("rewards").innerHTML=html

let next=rewards.find(r=>points<r.pts)

if(next){
document.getElementById("next").innerText=
"Next: "+next.name+" ("+(next.pts-points)+" pts)"
}else{
document.getElementById("next").innerText="All rewards unlocked"
}

document.getElementById("bar").style.width=(Math.min(points/480,1)*100)+"%"

if(newItem) popup("🎉 "+newItem+" unlocked!")
}

// QUESTION BANK (expanded)
const questions=[

["The crowd roared","Which technique?",["Verb","Metaphor","Fact"],0],
["The stadium exploded with noise","Technique?",["Metaphor","Simile","Verb"],0],
["The wind screamed through the trees","Technique?",["Personification","Fact","Opinion"],0],
["Her heart raced like a drum","Technique?",["Simile","Metaphor","Verb"],0],
["The room was a freezer","Technique?",["Metaphor","Simile","Fact"],0],

["The silence filled the room","Effect?",["Tension","Joy","Calm"],0],
["The crowd held its breath","Effect?",["Suspense","Relaxation","Boredom"],0],
["He crept slowly","Suggests?",["Stealth","Happiness","Anger"],0],
["She stared coldly","Effect?",["Hostility","Warmth","Confusion"],0],
["The lights flickered","Creates?",["Tension","Calm","Humour"],0],

["The word 'roared' suggests...","Best answer?",["Power","Weakness","Silence"],0],
["The word 'exploded' suggests...","Best answer?",["Intensity","Calm","Slow pace"],0],
["The word 'crept' suggests...","Best answer?",["Stealth","Speed","Noise"],0],
["The word 'frozen' suggests...","Best answer?",["Stillness","Movement","Heat"],0],

["Short sentence used. Why?","Answer?",["Creates impact","Adds detail","Shows setting"],0],
["Long sentence used. Why?","Answer?",["Builds detail","Creates shock","Shows silence"],0],
["Focus shifts to crowd. Why?","Answer?",["Show reaction","Add humour","Slow pace"],0],

["The phrase 'wave of sound' is...","Answer?",["Metaphor","Fact","Simile"],0],
["The phrase 'as quiet as night' is...","Answer?",["Simile","Metaphor","Verb"],0],
["The verb 'charged' suggests...","Answer?",["Speed","Calm","Fear"],0],
["The adjective 'cold' suggests...","Answer?",["Emotion","Speed","Noise"],0]

]

// GCSE EXTRACTS
const extracts=[

{
text:`Lines 1–5

The crowd roared as Frimpong surged down the wing. The noise built into a wave, crashing across the stadium.`,
q:"How does the writer use language to describe the atmosphere? (8 marks)"
},

{
text:`Lines 2–6

Wirtz moved like a shadow, silent and quick. Defenders struggled to react as he slipped past them.`,
q:"How does the writer present Wirtz’s movement? (8 marks)"
},

{
text:`Lines 1–4

The silence pressed down on the stadium. Every supporter waited, frozen in anticipation.`,
q:"How does the writer create tension? (8 marks)"
},

{
text:`Lines 3–7

The player paused. Then suddenly, he exploded forward, leaving the defender behind.`,
q:"How does the writer use structure to create impact? (8 marks)"
}

]

const weak="The writer uses words to show excitement."

// FLOW
function load(){

loadRewards()

if(step<3){
loadMC()
}else if(step==3){
loadExam()
}else{
loadImprove()
}
}

// MC
function loadMC(){

let q=questions[Math.floor(Math.random()*questions.length)]

let html="<p>"+q[0]+" — "+q[1]+"</p>"

q[2].forEach((a,i)=>{
html+=`<button onclick="ans(${i},${q[3]})">${a}</button>`
})

document.getElementById("mc").innerHTML=html
}

function ans(i,c){

if(i==c){
points+=10
step++
save()
location.reload()
}else{
alert("Try again – think carefully")
}
}

// EXAM
function loadExam(){

let e=extracts[Math.floor(Math.random()*extracts.length)]

document.getElementById("mc").style.display="none"

document.getElementById("exam").style.display="block"
document.getElementById("exam").innerHTML=`
<p>${e.text}</p>
<p><b>${e.q}</b></p>
<textarea id="ansBox"></textarea>
<button onclick="mark()">Submit</button>
<p id="fb"></p>
`
}

// MARKING
function mark(){

let t=document.getElementById("ansBox").value.toLowerCase()

let score=0
let feedback=[]

if(t.includes("'")||t.includes('"')) score++
else feedback.push("Add a short quote")

if(t.includes("metaphor")||t.includes("simile")||t.includes("verb")||t.includes("adjective")) score++
else feedback.push("Name the technique")

if(t.includes("suggest")||t.includes("shows")||t.includes("makes")) score++
else feedback.push("Explain the effect (this suggests...)")

let msg=""
if(score==1) msg="Level 1 (1–2 marks)"
if(score==2){ msg="Level 2 (3–5 marks)"; points+=20 }
if(score==3){ msg="Level 3 (6–8 marks)"; points+=35 }

document.getElementById("fb").innerText =
msg + "\n\n" +
(score===3
? "This is a clear Level 3 response. Well done."
: "To reach the next level:\n" + feedback.join("\n"))

step++
save()
}

// IMPROVE TASK
function loadImprove(){

document.getElementById("exam").style.display="none"
document.getElementById("improve").style.display="block"

document.getElementById("improve").innerHTML=`
<p><b>Improve this answer:</b></p>
<p>${weak}</p>
<textarea id="imp"></textarea>
<button onclick="done()">Submit</button>
<p id="impFb"></p>
`
}

function done(){

points+=15

document.getElementById("impFb").innerText=
"Better — aim to include quote + technique + effect."

step=0
save()

setTimeout(()=>location.reload(),1000)
}

// SAVE
function save(){
localStorage.setItem("points",points)
localStorage.setItem("step",step)
}

load()

</script>

</body>
</html>
