<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AQA GCSE English – Ultimate Trainer FINAL</title>

<style>
body{margin:0;background:#eef2f7;font-family:-apple-system;text-align:center;padding:20px;color:#1f2937;}
.card{background:white;padding:18px;border-radius:14px;margin-top:15px;box-shadow:0 6px 18px rgba(0,0,0,0.08);}
button{background:#1d4ed8;color:white;border:none;padding:14px;border-radius:10px;margin:6px;width:90%;}
textarea{width:92%;height:120px;border-radius:10px;padding:10px;border:1px solid #ccc;}
.good{background:#ecfdf5;padding:10px;border-radius:10px;margin-top:10px}
.model{background:#eff6ff;padding:10px;border-radius:10px;margin-top:10px}
.improve{background:#fff7ed;padding:10px;border-radius:10px;margin-top:10px}
.coach{background:#f0f9ff;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>AQA GCSE English – Ultimate Trainer 🔥</h2>

<button onclick="setMode('fast')">⚡ Fast Practice</button>
<button onclick="setMode('exam')">📝 Exam Practice</button>
<button onclick="startExam()">📝 Full Exam Mode</button>

<div class="card">
<input id="userName" placeholder="Enter name">
<button onclick="setUser()">Switch User</button>
<button onclick="resetAll()">Reset</button>
<p>User: <b id="user"></b></p>
</div>

<div class="card">
<p>Points: <b id="points"></b></p>
<p>Streak: <b id="streak"></b></p>
<p>Daily Streak: <b id="daily"></b></p>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Total Answers: <b id="total"></b></p>
<p>Average Score: <b id="avg"></b></p>
<p>Weakest Skill: <b id="weak"></b></p>
<p>Exam Readiness: <b id="ready"></b></p>
</div>

<div class="card" id="mc"></div>
<div class="card" id="main"></div>

<script>

// ================= USER =================
let user = localStorage.getItem("user") || "default"
document.getElementById("user").innerText=user

function setUser(){
let n=document.getElementById("userName").value
if(!n) return
localStorage.setItem("user",n)
location.reload()
}

function resetAll(){
if(confirm("Reset all?")){
localStorage.clear()
location.reload()
}
}

function get(k,d){return JSON.parse(localStorage.getItem(user+"_"+k)) ?? d}
function set(k,v){localStorage.setItem(user+"_"+k,JSON.stringify(v))}

// ================= STATE =================
let points=get("points",0)
let streak=get("streak",0)
let stats=get("stats",{total:0,totalScore:0})
let skills=get("skills",{quote:0,tech:0,effect:0,structure:0})
let usage=get("usage",{last:null,streak:0})

// ================= MODE =================
let mode=localStorage.getItem("mode")||"fast"
function setMode(m){localStorage.setItem("mode",m);location.reload()}

// ================= MC =================
const mc = []
for(let i=1;i<=100;i++){
mc.push([`Q${i}: The word 'dramatic' suggests...`,["Strong emotion","Calm","Confusion"],0])
}

// ================= WRITTEN =================
function makeSet(type){
let arr=[]
for(let i=1;i<=15;i++){
arr.push({
type:type,
text:`Extract ${i}: The scene builds tension and atmosphere.`,
q:`${type} question ${i}`,
model:`The word 'tension' suggests intensity.`
})
}
return arr
}

const fast={
P1Q2:makeSet("Language"),
P1Q3:makeSet("Structure"),
P1Q4:makeSet("Evaluation"),
P2Q2:makeSet("Summary"),
P2Q3:makeSet("Language"),
P2Q4:makeSet("Comparison")
}

const exam=JSON.parse(JSON.stringify(fast))

// ================= LOAD =================
function load(){
updateUI()
loadMC()
loadMain()
updateDaily()
updateDashboard()
}

// ================= UI =================
function updateUI(){
document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak
}

// ================= DAILY =================
function updateDaily(){
let t=new Date().toDateString()
if(usage.last!==t){
usage.streak++
usage.last=t
set("usage",usage)
}
document.getElementById("daily").innerText=usage.streak
}

// ================= DASH =================
function updateDashboard(){
document.getElementById("total").innerText=stats.total
let avg=stats.total? (stats.totalScore/stats.total).toFixed(1):0
document.getElementById("avg").innerText=avg

let weak=Object.entries(skills).sort((a,b)=>a[1]-b[1])[0][0]
document.getElementById("weak").innerText=weak

document.getElementById("ready").innerText=avg>3?"Ready":"Building"
}

// ================= MC =================
function loadMC(){
let q=mc[Math.floor(Math.random()*mc.length)]
let html=`<p>${q[0]}</p>`
q[1].forEach((a,i)=> html+=`<button onclick="ansMC(${i},${q[2]})">${a}</button>`)
document.getElementById("mc").innerHTML=html
}

function ansMC(i,c){
if(i==c){points+=10;streak++}else{streak=0}
save();location.reload()
}

// ================= MAIN =================
function loadMain(){
let bank=mode==="fast"?fast:exam
let types=Object.keys(bank)
let t=types[Math.floor(Math.random()*types.length)]
let q=bank[t][Math.floor(Math.random()*bank[t].length)]

document.getElementById("main").innerHTML=`
<p>${q.text}</p>
<p>${q.q}</p>
<textarea id="ans"></textarea>
<button onclick="mark('${t}')">Submit</button>
<div id="fb"></div>`
}

// ================= MARK =================
function mark(type){
let raw=document.getElementById("ans").value.toLowerCase()

let hasQuote=raw.includes("'")
let hasTech=/verb|metaphor|simile/.test(raw)
let hasEffect=/suggests|implies/.test(raw)
let hasStruct=raw.includes("structure")

skills.quote+=hasQuote?1:-1
skills.tech+=hasTech?1:-1
skills.effect+=hasEffect?1:-1
skills.structure+=hasStruct?1:-1

let score=[hasQuote,hasTech,hasEffect,hasStruct].filter(Boolean).length

if(score<2){
let improved="The word '___' suggests that..."
document.getElementById("fb").innerHTML=`
<div class="good">${raw}</div>
<div class="model">${improved}</div>`
return
}

points+=score*10
streak++
stats.total++
stats.totalScore+=score

save()

document.getElementById("fb").innerHTML=`
<p>+${score*10} points</p>
<button onclick="location.reload()">Next</button>`
}

// ================= EXAM =================
let examMode=false,examIndex=0,answers=[]

function startExam(){
examMode=true
examIndex=0
answers=[]
nextExamQ()
}

function nextExamQ(){
let all=[...fast.P1Q2,...fast.P1Q3,...fast.P1Q4]
let q=all[examIndex]
document.getElementById("main").innerHTML=`
<p>${q.text}</p>
<p>${q.q}</p>
<textarea id="ans"></textarea>
<button onclick="submitExam()">Submit</button>`
}

function submitExam(){
answers.push(document.getElementById("ans").value)
examIndex++
if(examIndex>=3) endExam()
else nextExamQ()
}

function endExam(){
let score=answers.length*25
document.getElementById("main").innerHTML=`
<h3>Exam Complete</h3>
<p>${score}%</p>
<button onclick="location.reload()">Back</button>`
}

// ================= SAVE =================
function save(){
set("points",points)
set("streak",streak)
set("stats",stats)
set("skills",skills)
set("usage",usage)
}

load()

</script>

</body>
</html>
